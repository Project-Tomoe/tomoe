name: Bug report
description: Report a reproducible Tomoe bug.
title: "[bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the smallest route, middleware, relic, or adapter code that reproduces the issue.
      render: ts
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Tomoe version
      placeholder: 1.0.0-rc.2
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Bun
        - Node.js
        - Deno
        - Cloudflare Workers
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
